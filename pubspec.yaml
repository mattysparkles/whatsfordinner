name: pantry_pilot
description: PantryPilot MVP scaffold - discover meals from ingredients on hand.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  flutter_tts: ^4.2.3
  speech_to_text: ^7.2.0
  wakelock_plus: ^1.2.10
  firebase_core: ^3.15.1
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
